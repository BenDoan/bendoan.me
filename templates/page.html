{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock title %}

{% block content %}
    <div class="post">
        <h2><a href="{{ url_for("page", path=page.path) }}">{{ page.title }}</a></h2>
        {% with page=page %}
            {% include "_meta.html" %}
        {% endwith %}
        <hr />
        {{ page.html|safe }}
    </div>

    {% include "_comments.html" %}
{% endblock content %}

<span class="meta">
    {{ page.author }} -
    {{ page.date }} -
    <a href="http://creativecommons.org/licenses/by-sa/4.0/">License</a>

    {% if page.meta.tags|length %}
        | Tagged:
        {% for page_tag in page.meta.tags %}
            <a href="{{ url_for("tag", tag=page_tag) }}">{{ page_tag }}</a>
        {% endfor %}
    {% endif %}
</span>
